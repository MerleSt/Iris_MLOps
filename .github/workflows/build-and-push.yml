name: Build and push Docker image

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'train.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build-and-push.yml'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        # Use a pre-made action called actions/checkout (version 4) to download the code from this repo onto the runner.

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push the image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            merlest/iris-mlops:latest
            merlest/iris-mlops:${{ github.sha }}
      
      - name: Update deployment manifest with new image tag
        run: |
          sed -i "s|image: merlest/iris-mlops:.*|image: merlest/iris-mlops:${{ github.sha }}|" k8s/deployment.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yml
          git commit -m "chore: update image to ${{ github.sha }}"
          git push